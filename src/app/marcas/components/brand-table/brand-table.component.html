<table mat-table [dataSource]="brands()" class="mat-elevation-z8">
  <!-- Id -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>Id</th>
    <td mat-cell *matCellDef="let element">{{ element.id }}</td>
  </ng-container>

  <!-- Nombre -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nombre</th>
    <td mat-cell *matCellDef="let element">{{ element.name }}</td>
  </ng-container>

  <!-- Activar/Desactivar -->
  <ng-container matColumnDef="activate">
    <th mat-header-cell *matHeaderCellDef>Activar</th>
    <td mat-cell *matCellDef="let element">
      <mat-slide-toggle [(ngModel)]="element.activate">
        {{ element.activate ? "Activo" : "Inactivo" }}
      </mat-slide-toggle>
    </td>
  </ng-container>

  <!-- Acciones -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Acciones</th>
    <td mat-cell *matCellDef="let element">
      <button mat-icon-button>
        <mat-icon aria-hidden="false" fontIcon="edit"></mat-icon>
      </button>
    </td>
  </ng-container>

  <!-- Header Row -->
  <tr mat-header-row *matHeaderRowDef="displayColumns"></tr>
  <!-- Data Rows -->
  <tr mat-row *matRowDef="let row; columns: displayColumns"></tr>
</table>
