<p class="text-2xl font-bold text-primary text-center">Masco Plus</p>

<div class="flex flex-col">
  @for(item of items; track item.path){
  <a
    [routerLink]="item.path"
    routerLinkActive="text-primary"
    [routerLinkActiveOptions]="{ exact: true }"
    class="cursor-pointer flex items-center gap-1 mb-3"
  >
    <mat-icon aria-hidden="false" [fontIcon]="item.data!['icon']"></mat-icon>
    {{ item.title }}
  </a>
  }
</div>
